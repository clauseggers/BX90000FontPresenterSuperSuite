<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="favicon.ico" sizes="32x32">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>Galley Proof BX90000 Zenith</title>
  <!-- Import the OpenType.js library first -->
  <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/opentype.js/1.3.4/opentype.min.js"></script> -->
  <script src="./opentypejs/opentype.js"></script>
  <!-- Import our modular JavaScript as a module -->
  <script type="module" src="./galleyproof/GalleyProof.js"></script>
  <!-- Original CSS remains the same -->
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="./galleyproof/GalleyProof.css">
</head>
<body>
  <div id="fullScreen">
    <button id="font-info-toggle">Show font info</button>
    <select id="colour-picker"></select>
    <button id="background-toggle">Swap colours</button>
    <button id="fullscreen-button">Fullscreen</button>
  </div>

  <div id="drop-text">
    Drop your TTF or OTF font here
  </div>

  <div class="display-container">
    <div id="galley"></div>
    <div id="glyph-display" class="glyph-buffer"></div>
  </div>

  <div id="info-panels">
    <div id="font-info" style="display: none;">
      <div id="font-info-content"></div>
    </div>
  </div>

  <div id="controls">
    <div class="buttons-container">
      <span class="controls-section-heading">OpenType features</span>
      <div class="feature-buttons-wrapper">
        <!-- Here the OpenType feature buttons are placed -->
      </div>
    </div>

    <div class="slider-container">
      <label for="galley-font-size">Font size</label>
      <input type="range" id="galley-font-size" min="0.3" max="8" step="0.01" value="1">
      <span class="value">1 rem</span>
    </div>

    <div class="slider-container">
      <label for="galley-leading">Leading</label>
      <input type="range" id="galley-leading" min="0.5" max="4" step="0.01" value="1.20">
      <span class="value">1.20×</span>
    </div>

    <div class="slider-container">
      <label for="galley-column-width">Column width</label>
      <input type="range" id="galley-column-width" min="20" max="100" value="60">
      <span class="value">60%</span>
    </div>

    <div class="slider-container">
      <label for="galley-letter-spacing">Letter spacing</label>
      <input type="range" id="galley-letter-spacing" min="-0.2" max="0.5" step="0.001" value="0">
      <span class="value">0 em</span>
    </div>

    <div class="slider-container">
      <label for="galley-word-spacing">Word spacing</label>
      <input type="range" id="galley-word-spacing" min="-1" max="2" step="0.001" value="0">
      <span class="value">0 em</span>
    </div>
  </div>
</div>
</body>
</html>
