<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/favicon.ico" sizes="32x32">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <title>TurboTiler BX90000 Fascination</title>
  <!-- Import the OpenType.js library first -->
  <script src="./opentypejs/opentype.js"></script>
  <!-- Import our modular JavaScript as a module -->
  <script type="module" src="./turbotiler/TurboTiler.js"></script>
  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="./turbotiler/TurboTiler.css">
</head>
<body>
  <div id="topBar">
    <div id="appFunctions">
      <select id="colour-picker">
        <option value="hsl(0deg 0% 0%)">Black</option>
        <option value="hsl(356deg 100% 60%)">Red</option>
        <option value="hsl(256deg 100% 60%)">Purple</option>
        <option value="hsl(222deg 100% 60%)">Blue</option>
        <option value="hsl(32deg 100% 50%)">Orange</option>
        <option value="hsl(100deg 100% 44%)">Green</option>
        <option value="hsl(185deg 85% 55%)">Cyan</option>
        <option value="hsl(315deg 80% 60%)">Magenta</option>
      </select>
      <button id="background-toggle" type="button">Swap colours</button>
      <button id="fullscreen-button" type="button">Fullscreen</button>
    </div>
  </div>

  <div id="drop-text">
    Drop your TTF or OTF font here
  </div>

  <div id="zoom-container">
    <div id="grid-container"></div>
  </div>
</body>
</html>
